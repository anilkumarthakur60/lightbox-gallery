version: 2
updates:
  # ── GitHub Actions used in the workflows (actions/checkout, setup-node, …) ──
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      github-actions:
        patterns:
          - "*"

  # ── npm / pnpm dependencies (single root pnpm-lock.yaml covers the workspace) ──
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    groups:
      # Batch the dev tooling (eslint, prettier, tsup, vitest, typescript, …)
      # into a single PR to keep the queue quiet.
      dev-dependencies:
        dependency-type: development
        patterns:
          - "*"
