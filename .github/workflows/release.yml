name: Release

on:
  push:
    branches: [main]

# Only one release run at a time.
concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # push version-bump commits / git tags
  pull-requests: write # open the "Version Packages" PR
  id-token: write # npm provenance (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      # When changesets exist -> opens/updates a "Version Packages" PR.
      # When that PR is merged (no changesets left) -> builds and publishes to npm.
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
