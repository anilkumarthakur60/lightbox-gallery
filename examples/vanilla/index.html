<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lightbox-gallery — vanilla example</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #16161c;
        color: #eee;
        padding: 32px;
      }
      h1 {
        font-weight: 600;
      }
      p {
        color: #9a9aa5;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 12px;
        max-width: 960px;
      }
      .grid a {
        display: block;
        aspect-ratio: 4 / 3;
        border-radius: 10px;
        overflow: hidden;
      }
      .grid img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.2s ease;
      }
      .grid a:hover img {
        transform: scale(1.04);
      }
    </style>
  </head>
  <body>
    <h1>lightbox-gallery — vanilla</h1>
    <p>Click any image. Try wheel/pinch zoom, swipe, double-click, arrow keys, f, Escape.</p>
    <div class="grid" id="gallery"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
