<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lightbox-gallery — Web Component example</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #16161c;
        color: #eee;
        padding: 32px;
      }
      h1 { font-weight: 600; }
      p { color: #9a9aa5; }
      code {
        background: rgba(255, 255, 255, 0.08);
        padding: 2px 6px;
        border-radius: 5px;
        font-size: 0.9em;
      }
      lightbox-gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 12px;
        max-width: 960px;
      }
      lightbox-gallery a {
        display: block;
        aspect-ratio: 4 / 3;
        border-radius: 10px;
        overflow: hidden;
      }
      lightbox-gallery img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.2s ease;
      }
      lightbox-gallery a:hover img { transform: scale(1.04); }
    </style>
  </head>
  <body>
    <h1>lightbox-gallery — Web Component</h1>
    <p>
      Using the <code>&lt;lightbox-gallery bind="a"&gt;</code> custom element — works in any
      framework or plain HTML. Click any image; try wheel zoom, swipe, arrow keys, f, Escape.
    </p>
    <lightbox-gallery bind="a" id="gallery"></lightbox-gallery>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
